    <!-- 雪花动画 -->
    <script>
        function createSnow() {
            const count = 35;
            for(let i=0;i<count;i++) {
                let flake = document.createElement('div');
                flake.className = 'snowflake';
                flake.textContent = '❄';
                
                let size = Math.random()*20 + 20;
                let left = Math.random()*100;
                let dur = Math.random()*8 + 6;
                let delay = Math.random()*10;
                
                flake.style.cssText = `
                    font-size:${size}px;
                    left:${left}%;
                    animation-duration:${dur}s;
                    animation-delay:${delay}s;
                `;
                document.body.appendChild(flake);
            }
        }
        window.addEventListener('load',createSnow);
    </script>

    <!-- 倒计时JS -->
    <script>
        let totalTime = 300;
        const minutesEl = document.getElementById('minutes');
        const secondsEl = document.getElementById('seconds');
        const titleEl = document.getElementById('countdown-title');

        const countdown = setInterval(() => {
            const mins = Math.floor(totalTime / 60);
            const secs = totalTime % 60;
            minutesEl.textContent = mins.toString().padStart(2, '0');
            secondsEl.textContent = secs.toString().padStart(2, '0');
            totalTime--;

            if (totalTime < 0) {
                clearInterval(countdown);
                titleEl.textContent = 'Limited Time Offer Ended';
                minutesEl.textContent = '00';
                secondsEl.textContent = '00';
            }
        }, 1000);
    </script>

        // WhatsApp 按钮点击事件
        document.addEventListener('DOMContentLoaded', function() {
