<script>
(function () {
  const COOLDOWN = 4000; // 4s anti-spam

  function getKey(pos) {
    return "wa_click_" + pos;
  }

  function canSend(pos) {
    const key = getKey(pos);
    const last = localStorage.getItem(key);
    const now = Date.now();

    if (last && (now - parseInt(last)) < COOLDOWN) {
      return false;
    }
    localStorage.setItem(key, now.toString());
    return true;
  }

  function sendEvent(pos) {
    const eventId = "evt_" + pos + "_" + Date.now();

    fbq('track', 'Lead', {
      content_name: 'WhatsApp Contact',
      method: 'whatsapp',
      position: pos,
      event_source: 'website'
    }, {
      eventID: eventId
    });
  }

  document.addEventListener("DOMContentLoaded", function () {
    const buttons = document.querySelectorAll('.whatsapp-btn');

    buttons.forEach(function(btn, index) {
      const pos = index === 0 ? 'top' : 'bottom';

      btn.addEventListener('click', function () {
        if (!canSend(pos)) return;
        sendEvent(pos);
      });
    });
  });
})();
</script>
